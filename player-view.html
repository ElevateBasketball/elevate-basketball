<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elevate Basketball — Player Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#111;color:#e8e8e8;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:1rem}
.header{text-align:center;padding:1.5rem 0 1rem;border-bottom:1px solid #2e2e2e;margin-bottom:1.25rem}
.logo{font-size:36px;margin-bottom:6px}
.title{font-size:20px;font-weight:600}
.title span{color:#60c070}
.sub{font-size:13px;color:#999;margin-top:4px}
.synb{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;padding:7px 12px;border-radius:8px;margin-bottom:1.25rem;font-weight:500;text-align:center}
.synb.ok{background:#0a2010;color:#60c070}
.synb.ing{background:#2d2008;color:#f0c060}
.synb.err{background:#2d0a0a;color:#f07070}
.card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:#999;margin-bottom:14px}
label{font-size:13px;color:#999;display:block;margin-bottom:4px}
input,select,textarea{width:100%;font-family:inherit;font-size:14px;background:#222;border:1px solid #3a3a3a;border-radius:8px;padding:10px 12px;color:#e8e8e8;outline:none;margin-bottom:11px}
input:focus,select:focus{border-color:#60c070}
.btn{padding:10px 16px;border-radius:8px;border:1px solid #3a3a3a;background:transparent;cursor:pointer;font-size:14px;font-family:inherit;color:#e8e8e8;width:100%;display:block;text-align:center}
.btn:hover{background:#222}
.btn:active{transform:scale(0.97)}
.btn-p{background:#60c070;color:#061206;border-color:#60c070;font-weight:600}
.btn-p:hover{opacity:0.88;background:#60c070}
.btn-sm{padding:5px 10px;font-size:12px;width:auto;display:inline-block}
.tabs{display:flex;border-bottom:1px solid #2e2e2e;margin-bottom:1.25rem}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#999;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;white-space:nowrap;flex:1;text-align:center}
.tab.active{color:#e8e8e8;border-bottom-color:#e8e8e8;font-weight:500}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.wl{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.wl-dates{font-size:20px;font-weight:700;color:#e8e8e8;letter-spacing:-0.3px;line-height:1.2}
.wl-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;padding:2px 8px}
.wl-badge-now{color:#60c070;background:#0a2010;border:1px solid #1a5a20}
.wl-badge-next{color:#7ab8f0;background:#0c2040;border:1px solid #1a4a8a}
.wl-badge-past{color:#999;background:#1a1a1a;border:1px solid #333}
.wl-badge-future{color:#f0b060;background:#2d1f08;border:1px solid #6a4010}
.wbtn{padding:8px 16px;border-radius:8px;border:1px solid #3a3a3a;background:transparent;cursor:pointer;font-size:16px;font-family:inherit;color:#e8e8e8}
.wbtn:hover{background:#222}
.avatar{width:48px;height:48px;border-radius:50%;background:#0a2d18;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#60c070;flex-shrink:0}
.player-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #2e2e2e}
.pname{font-size:18px;font-weight:600}
.pinfo{font-size:12px;color:#999;margin-top:2px}
.bdg{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.bg{background:#0a2010;color:#60c070}
.bgr{background:#222;color:#999}
.bpro{background:#0c2d4a;color:#7ab8f0}
.btent{background:#2d2008;color:#f0c060}
.bconf{background:#0a2010;color:#60c070}
.session{border-radius:10px;padding:14px 16px;border:1px solid;margin-bottom:10px}
.h1s{background:#0c2a45;border-color:#1a4a75}
.h2s{background:#2d1e08;border-color:#7a4a15}
.hps{background:#0a2010;border-color:#1a5a25}
.tents{opacity:0.7;border-style:dashed}
.sess-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.sess-day{font-size:15px;font-weight:600;color:#e8e8e8}
.sess-date{font-size:12px;color:#999;margin-top:1px}
.sess-detail{font-size:12px;color:#999;margin-bottom:3px}
.note-bar{background:#2d2008;border-radius:8px;padding:8px 12px;font-size:12px;color:#f0c060;margin-top:8px}
.no-sessions{text-align:center;padding:2rem;color:#666;font-size:13px}
/* AVAILABILITY */
.avail-day-block{background:#222;border:1px solid #3a3a3a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.avail-day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none}
.avail-day-header.on{background:#0a2d18;border-bottom:1px solid #1a5a25}
.avail-day-left{display:flex;align-items:center;gap:10px}
.avail-check{font-size:20px}
.avail-day-name{font-size:14px;font-weight:500}
.avail-day-date{font-size:11px;color:#999}
.avail-day-right{font-size:12px;color:#999}
.avail-times{padding:12px 14px;border-top:1px solid #2e2e2e;display:none}
.avail-times.show{display:block}
.time-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.time-row label{font-size:12px;color:#999;margin-bottom:0;width:50px;flex-shrink:0}
.time-row select{margin-bottom:0;font-size:13px;flex:1}
.time-hint{font-size:11px;color:#666;margin-top:4px}
.saved-flash{font-size:12px;color:#60c070;text-align:center;margin-top:8px;min-height:16px}
.divider{height:1px;background:#2e2e2e;margin:14px 0}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo">🏀</div>
  <div class="title"><span>Elevate</span> Basketball</div>
  <div class="sub">Player Portal</div>
</div>
<div class="synb ing" id="syn">⏳ Loading...</div>

<!-- AUTH -->
<div id="screen-auth">
  <div class="card">
    <div class="card-title">Welcome 👋</div>
    <div class="card-sub">Select your name to sign in.</div>
    <label>Select your name</label>
    <select id="player-select" onchange="onPlayerSelect()"><option value="">— Select your name —</option></select>
    <div class="divider"></div>
    <div class="card-title" style="margin-bottom:4px">First time? Register here</div>
    <div style="font-size:12px;color:#999;margin-bottom:12px">Your trainer will be notified and can start booking your sessions.</div>
    <label>Full name *</label>
    <input type="text" id="reg-name" placeholder="Your full name">
    <label>Email</label>
    <input type="email" id="reg-email" placeholder="your@email.com">
    <label>Phone number</label>
    <input type="tel" id="reg-phone" placeholder="(555) 000-0000">
    <label>Level</label>
    <select id="reg-level">
      <option value="">— Select —</option>
      <option value="Youth">Youth</option>
      <option value="High School">High School</option>
      <option value="College">College</option>
      <option value="Semi-Pro">Semi-Pro</option>
      <option value="Pro">Pro</option>
    </select>
    <button class="btn btn-p" onclick="register()">Register &amp; continue →</button>
    <div class="saved-flash" id="reg-flash"></div>
  </div>
</div>

<!-- PIN GATE -->
<div id="screen-pin" style="display:none">
  <div class="card" style="text-align:center">
    <div style="font-size:32px;margin-bottom:12px">🔒</div>
    <div class="card-title" style="margin-bottom:6px" id="pin-name-label">Enter your PIN</div>
    <div class="card-sub">Your trainer will have sent you a 4-digit PIN.</div>
    <input type="password" id="pin-input" placeholder="••••" maxlength="6" style="text-align:center;font-size:22px;letter-spacing:8px;margin-top:8px" onkeydown="if(event.key==='Enter')checkPin()">
    <div id="pin-err" style="color:#f07070;font-size:12px;margin-bottom:8px;display:none">Incorrect PIN. Try again.</div>
    <button class="btn btn-p" style="margin-bottom:8px" onclick="checkPin()">Continue →</button>
    <button class="btn" onclick="backToSelect()" style="font-size:13px;color:#666;border:none">← Back</button>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <div style="font-size:13px;color:#999">Signed in as <strong id="signed-in-name" style="color:#e8e8e8"></strong></div>
    <button class="btn btn-sm" onclick="signOut()" style="font-size:12px;padding:5px 10px">Switch</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'avail')">✅ Availability</button>
    <button class="tab" onclick="switchTab(this,'sessions')">📅 Sessions</button>
    <button class="tab" onclick="switchTab(this,'profile')">👤 Profile</button>
  </div>
  <div class="week-nav">
    <button class="wbtn" onclick="chgWk(-1)">‹</button>
    <div class="wl" id="wklbl">—</div>
    <button class="wbtn" onclick="chgWk(1)">›</button>
  </div>
  <div id="tab-sessions" style="display:none"></div>
  <div id="tab-avail"></div>
  <div id="tab-invoices" style="display:none"></div>
  <div id="tab-profile" style="display:none"></div>
</div>
</div>
<script>
var SBU='https://vjnanbggseohhpdrcblq.supabase.co';
var SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqbmFuYmdnc2VvaGhwZHJjYmxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTAzNzIsImV4cCI6MjA5NjAyNjM3Mn0.MfqBhb7hiuYZADLfTYMl6gRo59BClfFvij_6imafqcQ';
var HDR={'apikey':SBK,'Authorization':'Bearer '+SBK,'Content-Type':'application/json'};
var DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var wkOff=0;
var currentWkOff=0;
var activeTab='avail';
var state={players:[],sessions:[],locations:{},dayNotes:{},playerAvail:{},invoices:[]};
var selPlayer=null;

function gid(){return '_'+Math.random().toString(36).substr(2,9)}
function t2m(t){if(!t)return 0;var p=t.split(':');return+p[0]*60+ +p[1]}
function fmtT(t){if(!t)return'';var p=t.split(':');var h=+p[0];return(h>12?h-12:h)+':'+p[1]+(h>=12?'pm':'am')}
function ini(n){return n.split(' ').map(function(x){return x[0]}).join('').toUpperCase().slice(0,2)}
function fmtD(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function setSyn(cls,msg){var b=document.getElementById('syn');b.className='synb '+cls;b.textContent=msg}

function timeOpts(){
  var opts=['<option value="">Any time</option>'];
  for(var h=9;h<=14;h++){
    [0,30].forEach(function(m){
      if(!(h===14&&m===30)){
        var val=h+':'+String(m).padStart(2,'0');
        opts.push('<option value="'+val+'">'+fmtT(val)+'</option>');
      }
    });
  }
  return opts.join('');
}

function getWkDates(){
  var b=new Date(2026,5,1);b.setDate(b.getDate()+wkOff*7);
  var mon=new Date(b);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  return DAYS.map(function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d});
}
function getWkDatesFor(off){
  var b=new Date(2026,5,1);b.setDate(b.getDate()+off*7);
  var mon=new Date(b);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  return DAYS.map(function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d});
}
function updWkLbl(){
  var dates=getWkDates();
  var rel=wkOff-currentWkOff;
  var badge='';
  if(rel===0) badge='<div class="wl-badge wl-badge-now">📅 Current week</div>';
  else if(rel===1) badge='<div class="wl-badge wl-badge-next">⏭ Next week</div>';
  else if(rel===-1) badge='<div class="wl-badge wl-badge-past">⏮ Last week</div>';
  else if(rel>1) badge='<div class="wl-badge wl-badge-future">'+rel+' weeks ahead</div>';
  else badge='<div class="wl-badge wl-badge-past">'+Math.abs(rel)+' weeks ago</div>';
  var el=document.getElementById('wklbl');
  el.innerHTML=badge+'<div class="wl-dates">'+fmtD(dates[0])+' \u2013 '+fmtD(dates[5])+'</div>';
}
function chgWk(d){wkOff+=d;updWkLbl();renderActive()}

function initWkOff(){
  var base=new Date(2026,5,1);
  var today=new Date();
  var diff=Math.floor((today-base)/(7*24*60*60*1000));
  wkOff=diff;
  currentWkOff=diff;
}

function scrollToToday(){
  var today=new Date();
  var dayName=DAYS[today.getDay()===0?6:today.getDay()-1];
  var el=document.getElementById('sday-'+dayName);
  if(el)setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'start'})},150);
}

function switchTab(btn,name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');activeTab=name;
  ['sessions','avail','invoices','profile'].forEach(function(t){document.getElementById('tab-'+t).style.display=t===name?'block':'none'});
  renderActive();
}
function renderActive(){
  if(activeTab==='sessions')renderSessions();
  else if(activeTab==='avail')renderAvail();
  else if(activeTab==='invoices')renderInvoices();
  else renderProfile();
}

async function load(){
  setSyn('ing','\u23F3 Loading...');
  try{
    var r=await fetch(SBU+'/rest/v1/state?id=eq.main&select=data',{headers:HDR});
    var rows=await r.json();
    if(rows&&rows.length&&rows[0].data){
      var d=rows[0].data;
      var s=d.state||{};
      if(Array.isArray(d.players)&&d.players.length>0)state.players=d.players;
      else if(Array.isArray(s.players))state.players=s.players;
      if(Array.isArray(d.sessions)&&d.sessions.length>0)state.sessions=d.sessions;
      else if(Array.isArray(s.sessions))state.sessions=s.sessions;
      if(d.locations)state.locations=d.locations;
      else if(s.locations)state.locations=s.locations;
      if(d.dayNotes)state.dayNotes=d.dayNotes;
      else if(s.dayNotes)state.dayNotes=s.dayNotes;
      if(d.playerAvail)state.playerAvail=d.playerAvail;
      else if(s.playerAvail)state.playerAvail=s.playerAvail;
      if(d.payPeriodStatus)state.payPeriodStatus=d.payPeriodStatus;else if(s.payPeriodStatus)state.payPeriodStatus=s.payPeriodStatus;
      // weekOffset not loaded from DB — player portal always uses today's date
      if(Array.isArray(d.invoices))state.invoices=d.invoices;
    }
    setSyn('ok','\u2713 Connected');
    buildPlayerSelect();updWkLbl();
    var saved=localStorage.getItem('eb_player_id');
    if(saved){
      var p=state.players.find(function(x){return x.id===saved});
      if(p){selPlayer=saved;showMainScreen(p);return;}
      else localStorage.removeItem('eb_player_id');
    }
  }catch(e){setSyn('err','\u26A0 Could not connect. Try refreshing.')}
}

var pendingPlayerId=null;

function buildPlayerSelect(){
  var sel=document.getElementById('player-select');var prev=sel.value;
  sel.innerHTML='<option value="">— Select your name —</option>'+
    state.players.slice().sort(function(a,b){return a.name.localeCompare(b.name)}).map(function(p){return '<option value="'+p.id+'">'+p.name+'</option>'}).join('');
  if(prev)sel.value=prev;
}

function onPlayerSelect(){
  var sel=document.getElementById('player-select');if(!sel.value)return;
  var p=state.players.find(function(x){return x.id===sel.value});if(!p)return;
  if(p.pin){
    pendingPlayerId=p.id;
    document.getElementById('pin-name-label').textContent='Hi '+p.name.split(' ')[0]+'! Enter your PIN';
    document.getElementById('pin-input').value='';
    document.getElementById('pin-err').style.display='none';
    document.getElementById('screen-auth').style.display='none';
    document.getElementById('screen-pin').style.display='block';
  } else {
    selPlayer=p.id;localStorage.setItem('eb_player_id',selPlayer);showMainScreen(p);
  }
}

function checkPin(){
  var entered=document.getElementById('pin-input').value.trim();
  var p=state.players.find(function(x){return x.id===pendingPlayerId});
  if(!p)return;
  if(entered===String(p.pin)){
    selPlayer=p.id;localStorage.setItem('eb_player_id',selPlayer);
    document.getElementById('screen-pin').style.display='none';
    showMainScreen(p);
  } else {
    document.getElementById('pin-err').style.display='block';
    document.getElementById('pin-input').value='';
  }
}

function backToSelect(){
  pendingPlayerId=null;
  document.getElementById('screen-pin').style.display='none';
  document.getElementById('screen-auth').style.display='block';
  document.getElementById('player-select').value='';
}

function showMainScreen(p){
  initWkOff();
  updWkLbl();
  document.getElementById('screen-auth').style.display='none';
  document.getElementById('screen-main').style.display='block';
  document.getElementById('signed-in-name').textContent=p.name;
  renderActive();scrollToToday();
}

function signOut(){
  selPlayer=null;localStorage.removeItem('eb_player_id');
  document.getElementById('screen-auth').style.display='block';
  document.getElementById('screen-main').style.display='none';
  buildPlayerSelect();
}

async function register(){
  var name=document.getElementById('reg-name').value.trim();
  if(!name){document.getElementById('reg-flash').textContent='Name is required.';document.getElementById('reg-flash').style.color='#f07070';return}
  var email=document.getElementById('reg-email').value.trim();
  var phone=document.getElementById('reg-phone').value.trim();
  var level=document.getElementById('reg-level').value;
  var flash=document.getElementById('reg-flash');
  flash.style.color='#f0c060';flash.textContent='Registering...';
  var existing=state.players.find(function(p){return p.name.toLowerCase()===name.toLowerCase()});
  if(existing){
    selPlayer=existing.id;localStorage.setItem('eb_player_id',selPlayer);
    if(email)existing.email=email;if(phone)existing.contact=phone;if(level)existing.level=level;
    await dbSave();
    flash.style.color='#60c070';flash.textContent='\u2713 Welcome back, '+existing.name+'!';
    setTimeout(function(){showMainScreen(existing)},800);return;
  }
  var np={id:gid(),name:name,email:email||'',contact:phone||'',level:level||'',group:'',notes:''};
  state.players.push(np);selPlayer=np.id;localStorage.setItem('eb_player_id',selPlayer);
  try{
    await dbSave();
    flash.style.color='#60c070';flash.textContent='\u2713 Registered! Welcome, '+name+'!';
    buildPlayerSelect();setTimeout(function(){showMainScreen(np)},800);
  }catch(e){
    flash.style.color='#f07070';flash.textContent='\u26A0 Registration failed.';
    state.players=state.players.filter(function(p){return p.id!==np.id});
  }
}

async function dbSave(){
  // Read current DB first to preserve workers and other data
  var cur={};
  try{
    var rc=await fetch(SBU+'/rest/v1/state?id=eq.main&select=data',{headers:HDR});
    var rj=await rc.json();
    if(rj&&rj.length&&rj[0].data){
      cur=rj[0].data;
      // Flatten old nested format if needed
      if(cur.state){var s=cur.state;if(Array.isArray(s.workers)&&!cur.workers)cur.workers=s.workers;if(Array.isArray(s.players)&&!cur.players)cur.players=s.players;if(Array.isArray(s.sessions)&&!cur.sessions)cur.sessions=s.sessions;if(s.workerAvail&&!cur.workerAvail)cur.workerAvail=s.workerAvail;if(s.playerAvail&&!cur.playerAvail)cur.playerAvail=s.playerAvail;if(s.locations&&!cur.locations)cur.locations=s.locations;if(s.dayNotes&&!cur.dayNotes)cur.dayNotes=s.dayNotes;delete cur.state;}
    }
  }catch(e){}
  // Only update player-related fields
  cur.players=state.players;
  cur.playerAvail=state.playerAvail;
  // weekOffset not saved from player portal
  var r=await fetch(SBU+'/rest/v1/state?id=eq.main',{
    method:'PATCH',headers:Object.assign({},HDR,{'Prefer':'return=minimal'}),
    body:JSON.stringify({data:cur,updated_at:new Date().toISOString()})
  });
  if(!r.ok)throw new Error();setSyn('ok','\u2713 Saved');
}

function wkSessions(wo){
  return state.sessions.filter(function(s){return s.week===wo&&s.status==='confirmed'});
}

function renderSessions(){
  var content=document.getElementById('tab-sessions');
  var player=state.players.find(function(p){return p.id===selPlayer});if(!player){content.innerHTML='';return}
  var ws=wkSessions(wkOff);var dates=getWkDates();
  var mySessions=ws.filter(function(s){
    var nm=s.player&&s.player.toLowerCase().indexOf(player.name.toLowerCase())>=0;
    var gm=s.groupPlayers&&s.groupPlayers.indexOf(selPlayer)>=0;
    return nm||gm;
  }).sort(function(a,b){return DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||t2m(a.start)-t2m(b.start)});
  var html='<div class="card"><div class="player-header">'
    +'<div class="avatar">'+ini(player.name)+'</div>'
    +'<div><div class="pname">'+player.name+'</div><div class="pinfo">'
    +(player.level?'<span class="bdg bgr" style="margin-right:4px">'+player.level+'</span>':'')
    +(player.group?'<span class="bdg '+(player.group==='pro'?'bpro':'bgr')+'">'+player.group+'</span>':'')
    +'</div></div></div>';
  if(!mySessions.length){
    html+='<div class="no-sessions">No sessions scheduled this week.<br><span style="font-size:12px">Set your availability and your trainer will book you in.</span></div>';
  } else {
    html+='<div style="text-align:center;margin-bottom:1rem"><div style="font-size:11px;color:#999;margin-bottom:4px">Sessions this week</div><div style="font-size:28px;font-weight:600">'+mySessions.length+'</div></div>';
    mySessions.forEach(function(s){
      var di=DAYS.indexOf(s.day);var date=di>=0?dates[di]:null;
      var loc=state.locations[s.day]||'';var note=state.dayNotes[s.day+'-'+wkOff]||'';
      var dur=((t2m(s.end)-t2m(s.start))/60).toFixed(1);
      var cls='session ';if(s.hoop==='pro')cls+='hps';else if(s.hoop==='1')cls+='h1s';else cls+='h2s';if(s.status==='tentative')cls+=' tents';
      html+='<div class="'+cls+'"><div class="sess-top"><div><div class="sess-day">'+s.day+'</div>'+(date?'<div class="sess-date">'+fmtD(date)+'</div>':'')+'</div>'

      if(s.focus)html+='<div style="font-size:15px;font-weight:500;margin-bottom:6px">\uD83C\uDFCB '+s.focus+'</div>';
      if(s.type==='group')html+='<div class="sess-detail">\uD83E\uDD51 Group session</div>';
      if(loc)html+='<div class="sess-detail">📍 '+loc+'</div>';
      html+='<div style="margin-top:6px"><span class="bdg '+(s.status==='tentative'?'btent':'bconf')+'">'+( s.status==='tentative'?'Tentative \u2014 confirm with trainer':'Confirmed')+'</span></div>';
      if(note)html+='<div class="note-bar">📝 '+note+'</div>';
      if(s.notes)html+='<div style="font-size:12px;color:#999;margin-top:8px;font-style:italic">'+s.notes+'</div>';
      var confs=s.confirmations||[];
      var alreadyConf=confs.indexOf(selPlayer)>=0;
      var sessDate=dates[DAYS.indexOf(s.day)];
      var endP=s.end.split(':');var sessEndMs=sessDate?new Date(sessDate.getFullYear(),sessDate.getMonth(),sessDate.getDate(),+endP[0],+endP[1]).getTime():0;
      var isPast=sessEndMs>0&&Date.now()>sessEndMs;
      if(alreadyConf){
        html+='<div style="margin-top:10px;padding:9px 12px;background:#0a2d18;border:1px solid #1a5a25;border-radius:8px;text-align:center;font-size:13px;font-weight:600;color:#60c070">&#10003; Attendance confirmed</div>';
      } else if(!isPast){
        html+='<button class="conf-btn" data-sessid="'+s.id+'" style="width:100%;margin-top:10px;padding:11px;background:#185FA5;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Confirm attendance</button>';
      }
      html+='</div>';
    });
  }
  html+='</div>';content.innerHTML=html;
  content.onclick=function(e){var b=e.target.closest('.conf-btn');if(b)confirmAttendance(b.dataset.sessid);};
}

  DAYS.forEach(function(day,i){

    var timeLabel=isOn?(fromVal||toVal?(fmtT(fromVal)||'open')+' \u2013 '+(fmtT(toVal)||'open'):'Any time'):'';
    var isPast=dates[i]<today;
    html+='<div class="avail-day-block"'+(isPast?' style="opacity:0.35;pointer-events:none"':'')+'>'+

function togUnavailWeek(){
  var swo=wkOff;
  var k=selPlayer+'-unavail-'+swo;
  state.playerAvail[k]=!state.playerAvail[k];
  var btn=document.querySelector('#tab-avail .btn-p');
  if(btn){btn.textContent='Save availability';btn.style.background='';btn.style.borderColor='';btn.style.color='';}
  var banner=document.querySelector('.avail-saved-banner');if(banner)banner.remove();
  renderAvail();
}

function togAvailDay(day){
  if(!selPlayer)return;
  var swo=wkOff;
  var k=selPlayer+'-'+day+'-'+swo;state.playerAvail[k]=!state.playerAvail[k];
  // Reset save button to show unsaved changes
  var btn=document.querySelector('#tab-avail .btn-p');
  if(btn){btn.textContent='Save availability';btn.style.background='';btn.style.borderColor='';btn.style.color='';}
  var banner=document.querySelector('.avail-saved-banner');if(banner)banner.remove();
  renderAvail();
}

function saveTimeLocal(day){
  var swo=wkOff;
  var fEl=document.getElementById('from-'+day);var tEl=document.getElementById('to-'+day);
  if(fEl)state.playerAvail[selPlayer+'-'+day+'-'+swo+'-from']=fEl.value;
  if(tEl)state.playerAvail[selPlayer+'-'+day+'-'+swo+'-to']=tEl.value;
}

function adjSessCount(delta,type){
  var availWkOff=wkOff;
  var key=(type==='grp'?'sesscountgrp':'sesscountind')+'-'+selPlayer+'-'+availWkOff;
  var cur=parseInt(state.playerAvail[key])||0;
  var next=Math.max(0,Math.min(10,cur+delta));
  state.playerAvail[key]=next;
  // Also update legacy sesscount as total for backwards compat
  var ind=parseInt(state.playerAvail['sesscountind-'+selPlayer+'-'+availWkOff])||0;
  var grp=parseInt(state.playerAvail['sesscountgrp-'+selPlayer+'-'+availWkOff])||0;
  state.playerAvail['sesscount-'+selPlayer+'-'+availWkOff]=ind+grp;
  var el=document.getElementById('sess-count-'+(type==='grp'?'grp':'ind'));if(el)el.textContent=next;
  var btn=document.querySelector('#tab-avail .btn-p');
  if(btn){btn.textContent='Save availability';btn.style.background='';btn.style.borderColor='';btn.style.color='';}
  var banner=document.querySelector('.avail-saved-banner');if(banner)banner.remove();
}

async function saveAvail(){
  var availWkOff=wkOff;
  var isUnavail=!!state.playerAvail[selPlayer+'-unavail-'+availWkOff];
  var indCount=parseInt(state.playerAvail['sesscountind-'+selPlayer+'-'+availWkOff])||0;
  var grpCount=parseInt(state.playerAvail['sesscountgrp-'+selPlayer+'-'+availWkOff])||0;
  var legacy=parseInt(state.playerAvail['sesscount-'+selPlayer+'-'+availWkOff])||0;
  var sessCount=indCount+grpCount||legacy;
  if(!isUnavail&&sessCount===0){
    var flash=document.getElementById('avail-flash');
    if(flash){flash.textContent='\u26A0 Please set how many sessions you want this week before saving.';flash.style.color='#f07070';}
    return;
  }
  var noteEl=document.getElementById('avail-note');
  if(noteEl)state.playerAvail['note-'+selPlayer+'-'+availWkOff]=noteEl.value.trim();
  var btn=document.querySelector('#tab-avail .btn-p');
  if(btn){btn.textContent='Saving...';btn.disabled=true;}
  try{
    await dbSave();
    // Show locked confirmation
    var card=document.querySelector('#tab-avail .card');
    if(card){
      var banner=document.createElement('div');
      banner.style.cssText='background:#0a2d18;border:1px solid #2a7a40;border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px';
      banner.innerHTML='<span style="font-size:20px">\u2705</span><div><div style="font-size:14px;font-weight:600;color:#60c070">Availability saved!</div><div style="font-size:12px;color:#999;margin-top:2px">Your trainer can now see your availability for this week.</div></div>';
      // Remove any existing banner
      var existing=card.querySelector('.avail-saved-banner');
      if(existing)existing.remove();
      banner.classList.add('avail-saved-banner');
      card.insertBefore(banner,card.firstChild);
    }
    if(btn){btn.textContent='\u2713 Saved';btn.style.background='#0a2d18';btn.style.borderColor='#2a7a40';btn.style.color='#60c070';btn.disabled=false;}
  }catch(e){
    var flash=document.getElementById('avail-flash');
    if(flash){flash.textContent='\u26A0 Save failed';flash.style.color='#f07070';}
    if(btn){btn.textContent='Save availability';btn.disabled=false;}
  }
}

function renderInvoices(){
  var el=document.getElementById('tab-invoices');
  var player=state.players.find(function(p){return p.id===selPlayer});if(!player){el.innerHTML='';return;}
  var HOURLY=20;
  var allS=state.sessions.filter(function(s){return s.player===player.name&&s.status!=='draft'&&s.status!=='cancelled';});
  if(!allS.length){el.innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#666">No sessions recorded yet.</div>';return;}
  var weeks=allS.map(function(s){return s.week||0});
  var minWk=Math.min.apply(null,weeks);var maxWk=Math.max.apply(null,weeks);
  var periods=[];
  for(var pw=minWk;pw<=maxWk;pw+=2){
    var w1=pw,w2=pw+1;
    var ps=allS.filter(function(s){return s.week===w1||s.week===w2;});
    if(!ps.length)continue;
    var mins=ps.reduce(function(a,s){return a+t2m(s.end)-t2m(s.start);},0);
    var hrs=parseFloat((mins/60).toFixed(2));var amt=Math.round(hrs*HOURLY);
    var d1=getWkDatesFor(w1)[0];var d2=getWkDatesFor(w2)[5];
    var status=(state.payPeriodStatus&&state.payPeriodStatus['period-'+w1])||'pending';
    periods.push({w1:w1,w2:w2,sessions:ps,hrs:hrs,amount:amt,d1:d1,d2:d2,status:status});
  }
  periods.reverse();
  var totalOwed=periods.filter(function(p){return p.status!=='paid';}).reduce(function(a,p){return a+p.amount;},0);
  var totalPaid=periods.filter(function(p){return p.status==='paid';}).reduce(function(a,p){return a+p.amount;},0);
  var html='<div class="card" style="margin-bottom:1rem"><div style="font-size:13px;color:#999;margin-bottom:12px">Rate: $'+HOURLY+'/hr</div>'
    +'<div style="display:flex;gap:10px">'
    +'<div style="flex:1;background:#0a2010;border:1px solid #1a5a25;border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;color:#999;margin-bottom:4px">Total paid</div><div style="font-size:22px;font-weight:700;color:#60c070">$'+totalPaid+'</div></div>'
    +'<div style="flex:1;background:#2d0a0a;border:1px solid #7a1a1a;border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;color:#999;margin-bottom:4px">Balance due</div><div style="font-size:22px;font-weight:700;color:#f07070">$'+totalOwed+'</div></div>'
    +'</div></div>';
  periods.forEach(function(p){
    var isPaid=p.status==='paid';
    html+='<div class="card" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      +'<div><div style="font-size:13px;font-weight:600">'+fmtD(p.d1)+' to '+fmtD(p.d2)+'</div>'
      +'<div style="font-size:11px;color:#999;margin-top:2px">'+p.sessions.length+' sessions &middot; '+p.hrs.toFixed(1)+' hrs</div></div>'
      +'<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:'+(isPaid?'#60c070':'#f07070')+'">${'+p.amount+'}</div>'
      +'<div style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;'+(isPaid?'background:#0a2010;color:#60c070':'background:#2d0a0a;color:#f07070')+'">'+(isPaid?'Paid':'Due')+'</div>'
      +'</div></div>'
      +'<div style="border-top:1px solid #2e2e2e;padding-top:10px">';
    p.sessions.sort(function(a,b){return(a.week||0)-(b.week||0)||DAYS.indexOf(a.day)-DAYS.indexOf(b.day);}).forEach(function(s){
      var sPay=Math.round((t2m(s.end)-t2m(s.start))/60*HOURLY);
      html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:12px">'
        +'<div><span style="color:#e8e8e8">'+s.day+'</span>'
        +'<span style="color:#999;margin-left:8px">'+fmtT(s.start)+'-'+fmtT(s.end)+'</span></div>'
        +'<div style="color:#60c070;font-weight:500">$'+sPay+'</div></div>';
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}

setInterval(async function(){
  try{
    var r=await fetch(SBU+'/rest/v1/state?id=eq.main&select=data',{headers:HDR});
    var rows=await r.json();
    if(rows.length&&rows[0].data&&rows[0].data.state){
      var s=rows[0].data.state;
      state.players=s.players||[];state.sessions=s.sessions||[];
      state.locations=s.locations||{};state.dayNotes=s.dayNotes||{};state.playerAvail=s.playerAvail||{};
      buildPlayerSelect();if(activeTab==='sessions')renderSessions();
    }
  }catch(e){}
},60000);


async function confirmAttendance(sessId){
  var s=state.sessions.find(function(x){return x.id===sessId});
  if(!s||!selPlayer)return;
  if(!s.confirmations)s.confirmations=[];
  if(s.confirmations.indexOf(selPlayer)>=0)return;
  s.confirmations.push(selPlayer);
  try{
    var cur={};
    var rc=await fetch(SBU+'/rest/v1/state?id=eq.main&select=data',{headers:HDR});
    var rj=await rc.json();
    if(rj&&rj.length&&rj[0].data)cur=rj[0].data;
    var si=(cur.sessions||[]).findIndex(function(x){return x.id===sessId});
    if(si>=0){
      if(!cur.sessions[si].confirmations)cur.sessions[si].confirmations=[];
      if(cur.sessions[si].confirmations.indexOf(selPlayer)<0)cur.sessions[si].confirmations.push(selPlayer);
    }
    await fetch(SBU+'/rest/v1/state?id=eq.main',{method:'PATCH',headers:Object.assign({},HDR,{'Prefer':'return=minimal'}),body:JSON.stringify({data:cur,updated_at:new Date().toISOString()})});
    setSyn('ok','\u2713 Attendance confirmed!');
    renderSessions();
  }catch(e){
    s.confirmations=s.confirmations.filter(function(id){return id!==selPlayer});
    setSyn('err','Could not confirm. Try again.');
  }
}
