<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elevate Basketball — Apply</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#111;color:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem}
.header{text-align:center;margin-bottom:2rem;width:100%;max-width:600px}
.logo{font-size:42px;margin-bottom:8px}
.title{font-size:24px;font-weight:700;margin-bottom:4px}
.title span{color:#7ab8f0}
.sub{font-size:13px;color:#666;margin-bottom:4px}
.desc{font-size:13px;color:#999;margin-top:8px;line-height:1.6}
.form-wrap{width:100%;max-width:600px;background:#1a1a1a;border:1px solid #2e2e2e;border-radius:16px;padding:2rem;margin-bottom:2rem}
.back{display:inline-flex;align-items:center;gap:6px;color:#666;font-size:13px;text-decoration:none;margin-bottom:1.5rem;transition:color 0.15s}
.back:hover{color:#e8e8e8}
</style>
</head>
<body>

<div style="width:100%;max-width:600px">
  <a class="back" href="https://backend-portal-elevate.vercel.app/">&#8592; Back to portal</a>
</div>

<div class="header">
  <div class="logo">🏀</div>
  <div class="title"><span>Elevate</span> Basketball</div>
  <div class="sub">Player Application</div>
  <div class="desc">Fill out the form below to apply for training with Elevate Basketball. We'll be in touch shortly.</div>
</div>

<div class="form-wrap">
  <iframe
    src="https://api.leadconnectorhq.com/widget/form/XNY2VSlJtloIb3OrjYde"
    style="width:100%;min-height:600px;border:none;display:block"
    scrolling="no"
    id="elevate-application-form">
  </iframe>
</div>

<script src="https://link.msgsndr.com/js/form_embed.js"></script>
</body>
</html>
