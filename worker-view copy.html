<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elevate Basketball - Worker Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#111;color:#e8e8e8;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:1rem}
.header{text-align:center;padding:1.5rem 0 1rem;border-bottom:1px solid #2e2e2e;margin-bottom:1.25rem}
.logo{font-size:36px;margin-bottom:6px}
.title{font-size:20px;font-weight:600}
.title span{color:#7ab8f0}
.sub{font-size:13px;color:#999;margin-top:4px}
.synb{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;padding:7px 12px;border-radius:8px;margin-bottom:1.25rem;font-weight:500;text-align:center}
.synb.ok{background:#0a2010;color:#60c070}
.synb.ing{background:#2d2008;color:#f0c060}
.synb.err{background:#2d0a0a;color:#f07070}
.card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:#999;margin-bottom:14px}
label{font-size:13px;color:#999;display:block;margin-bottom:4px}
input,select,textarea{width:100%;font-family:inherit;font-size:14px;background:#222;border:1px solid #3a3a3a;border-radius:8px;padding:10px 12px;color:#e8e8e8;outline:none;margin-bottom:11px}
.btn{padding:10px 16px;border-radius:8px;border:1px solid #3a3a3a;background:transparent;cursor:pointer;font-size:14px;font-family:inherit;color:#e8e8e8;width:100%;display:block;text-align:center}
.btn:hover{background:#222}
.btn-p{background:#7ab8f0;color:#0a1a2a;border-color:#7ab8f0;font-weight:600}
.btn-p:hover{opacity:0.88;background:#7ab8f0}
.btn-sm{padding:5px 10px;font-size:12px;width:auto;display:inline-block}
.tabs{display:flex;border-bottom:1px solid #2e2e2e;margin-bottom:1.25rem}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#999;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;white-space:nowrap;flex:1;text-align:center}
.tab.active{color:#e8e8e8;border-bottom-color:#e8e8e8;font-weight:500}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.wl{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.wl-dates{font-size:20px;font-weight:700;color:#e8e8e8;letter-spacing:-0.3px;line-height:1.2}
.wl-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;padding:2px 8px}
.wl-badge-now{color:#60c070;background:#0a2010;border:1px solid #1a5a20}
.wl-badge-next{color:#7ab8f0;background:#0c2040;border:1px solid #1a4a8a}
.wl-badge-past{color:#999;background:#1a1a1a;border:1px solid #333}
.wl-badge-future{color:#f0b060;background:#2d1f08;border:1px solid #6a4010}
.wbtn{padding:8px 16px;border-radius:8px;border:1px solid #3a3a3a;background:transparent;cursor:pointer;font-size:16px;font-family:inherit;color:#e8e8e8}
.wbtn:hover{background:#222}
.avatar{width:48px;height:48px;border-radius:50%;background:#0c2d4a;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#7ab8f0;flex-shrink:0}
.avatar.ct{background:#2d1f08;color:#f0b060}
.worker-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #2e2e2e}
.wname{font-size:18px;font-weight:600}
.winfo{font-size:12px;color:#999;margin-top:2px}
.wstats{margin-left:auto;text-align:right}
.whrs{font-size:16px;font-weight:600}
.wpay{font-size:13px;color:#60c070;font-weight:500}
.bdg{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.bc{background:#0c2d4a;color:#7ab8f0}
.bt{background:#2d1f08;color:#f0b060}
.btent{background:#2d2008;color:#f0c060}
.shift{border-radius:10px;padding:12px 14px;border:1px solid;margin-bottom:8px}
.h1s{background:#0c2a45;border-color:#1a4a75}
.h2s{background:#2d1e08;border-color:#7a4a15}
.hps{background:#0a2010;border-color:#1a5a25}
.tents{opacity:0.7;border-style:dashed}
.day-pill{border:1px solid;border-radius:8px;padding:6px 3px;text-align:center}
.day-pill.active{background:#0c2a45;border-color:#1a4a75;color:#90c0f0;cursor:pointer}
.day-pill.off{background:#1a1a1a;border-color:#2e2e2e;color:#333}
.avail-day-block{background:#222;border:1px solid #3a3a3a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.avail-day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none}
.avail-day-header.on{background:#0a2d18;border-bottom:1px solid #1a5a25}
.avail-day-left{display:flex;align-items:center;gap:10px}
.avail-check{font-size:20px}
.avail-day-name{font-size:14px;font-weight:500}
.avail-day-date{font-size:11px;color:#999}
.avail-day-right{font-size:12px;color:#999}
.avail-times{padding:12px 14px;border-top:1px solid #2e2e2e;display:none}
.avail-times.show{display:block}
.time-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.time-row label{font-size:12px;color:#999;margin-bottom:0;width:50px;flex-shrink:0}
.time-row select{margin-bottom:0;font-size:13px;flex:1}
.saved-flash{font-size:12px;color:#60c070;text-align:center;margin-top:8px;min-height:16px}
.divider{height:1px;background:#2e2e2e;margin:14px 0}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="logo">&#127936;</div>
  <div class="title"><span>Elevate</span> Basketball</div>
  <div class="sub">Worker Portal</div>
</div>
<div class="synb ing" id="syn">&#9203; Loading...</div>

<div id="screen-auth">
  <div class="card">
    <div class="card-title">Welcome &#128075;</div>
    <div class="card-sub">Already registered? Select your name. First time? Register below.</div>
    <label>Select your name</label>
    <select id="worker-select" onchange="onWorkerSelect()"><option value="">-- Select your name --</option></select>
    <div class="divider"></div>
    <div class="card-title" style="margin-bottom:4px">First time? Register here</div>
    <div style="font-size:12px;color:#999;margin-bottom:12px">Your coach will assign your role once you are in.</div>
    <label>Full name *</label>
    <input type="text" id="reg-name" placeholder="Your full name">
    <label>Email</label>
    <input type="email" id="reg-email" placeholder="your@email.com">
    <label>Phone number</label>
    <input type="tel" id="reg-phone" placeholder="(555) 000-0000">
    <button class="btn btn-p" onclick="register()">Register and continue</button>
    <div class="saved-flash" id="reg-flash"></div>
  </div>
</div>

<div id="screen-main" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <div style="font-size:13px;color:#999">Signed in as <strong id="signed-in-name" style="color:#e8e8e8"></strong></div>
    <button class="btn btn-sm" onclick="signOut()" style="font-size:12px;padding:5px 10px">Switch</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'avail')">&#9989; Availability</button>
    <button class="tab" onclick="switchTab(this,'shifts')">&#128197; My shifts</button>
    <button class="tab" onclick="switchTab(this,'pay')">&#128181; Pay history</button>
    <button class="tab" onclick="switchTab(this,'profile')">&#128100; Profile</button>
  </div>
  <div class="week-nav">
    <button class="wbtn" onclick="chgWk(-1)">&#8249;</button>
    <div class="wl" id="wklbl">--</div>
    <button class="wbtn" onclick="chgWk(1)">&#8250;</button>
  </div>
  <div id="tab-shifts" style="display:none"></div>
  <div id="tab-avail"></div>
  <div id="tab-pay" style="display:none"></div>
  <div id="tab-profile" style="display:none"></div>
</div>
</div>

<script>
var SBU='https://vjnanbggseohhpdrcblq.supabase.co';
var SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqbmFuYmdnc2VvaGhwZHJjYmxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTAzNzIsImV4cCI6MjA5NjAyNjM3Mn0.MfqBhb7hiuYZADLfTYMl6gRo59BClfFvij_6imafqcQ';
var HDR={'apikey':SBK,'Authorization':'Bearer '+SBK,'Content-Type':'application/json'};
var DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function workerType(w){return w.workerType||(w.isIntern?'intern':'standard');}
function workerRate(w){var t=workerType(w);if(t==='hourly')return 15;if(t==='intern'||t==='salary')return 0;return 20;}
function payExcluded(w){var t=workerType(w);return !!w.isCoach||t==='intern'||t==='salary';}
var wkOff=0;
var currentWkOff=0;
var activeTab='avail';
var state={workers:[],sessions:[],locations:{},dayNotes:{},workerAvail:{}};
var selWorker=null;

function gid(){return '_'+Math.random().toString(36).substr(2,9)}
function t2m(t){if(!t)return 0;var p=t.split(':');return+p[0]*60+ +p[1]}
function fmtT(t){if(!t)return'';var p=t.split(':');var h=+p[0];return(h>12?h-12:h)+':'+p[1]+(h>=12?'pm':'am')}
function ini(n){return n.split(' ').map(function(x){return x[0]}).join('').toUpperCase().slice(0,2)}
function fmtD(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function setSyn(cls,msg){var b=document.getElementById('syn');b.className='synb '+cls;b.textContent=msg}

function timeOpts(){
  var opts=['<option value="">Any time</option>'];
  for(var h=9;h<=14;h++){[0,30].forEach(function(m){if(!(h===14&&m===30)){var val=h+':'+String(m).padStart(2,'0');opts.push('<option value="'+val+'">'+fmtT(val)+'</option>')}})}
  return opts.join('');
}

function getWkDates(){
  var b=new Date(2026,5,1);b.setDate(b.getDate()+wkOff*7);
  var mon=new Date(b);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  return DAYS.map(function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d});
}
function getWkDatesFor(off){
  var b=new Date(2026,5,1);b.setDate(b.getDate()+off*7);
  var mon=new Date(b);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  return DAYS.map(function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d});
}
function updWkLbl(){
  var dates=getWkDates();
  var rel=wkOff-currentWkOff;
  var badge='';
  if(rel===0) badge='<div class="wl-badge wl-badge-now">📅 Current week</div>';
  else if(rel===1) badge='<div class="wl-badge wl-badge-next">⏭ Next week</div>';
  else if(rel===-1) badge='<div class="wl-badge wl-badge-past">⏮ Last week</div>';
  else if(rel>1) badge='<div class="wl-badge wl-badge-future">'+rel+' weeks ahead</div>';
  else badge='<div class="wl-badge wl-badge-past">'+Math.abs(rel)+' weeks ago</div>';
  var el=document.getElementById('wklbl');
  el.innerHTML=badge+'<div class="wl-dates">'+fmtD(dates[0])+' \u2013 '+fmtD(dates[5])+'</div>';
}
function chgWk(d){wkOff+=d;updWkLbl();renderActive()}

function initWkOff(){
  var base=new Date(2026,5,1);
  var today=new Date();
  var diff=Math.floor((today-base)/(7*24*60*60*1000));
  wkOff=diff;
  currentWkOff=diff;
}

function scrollToToday(){
  var today=new Date();
  var dayName=DAYS[today.getDay()===0?6:today.getDay()-1];
  var el=document.getElementById('sday-'+dayName);
  if(el)setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'start'})},150);
}

function switchTab(btn,name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');activeTab=name;
  ['shifts','avail','pay','profile'].forEach(function(t){document.getElementById('tab-'+t).style.display=t===name?'block':'none'});
  renderActive();
}
function renderActive(){
  if(activeTab==='shifts')renderShifts();
  else if(activeTab==='avail')renderAvail();
  else if(activeTab==='pay')renderPayHistory();
  else renderProfile();
}

async function load(){
  setSyn('ing','Loading...');
  try{
    var r=await fetch(SBU+'/rest/v1/state?id=eq.main&select=data',{headers:HDR});
    var rows=await r.json();
    if(rows&&rows.length&&rows[0].data){
      var d=rows[0].data;
      var src=d.state||d;
      if(Array.isArray(d.workers)&&d.workers.length>0)state.workers=d.workers;
      else if(Array.isArray(src.workers)&&src.workers.length>0)state.workers=src.workers;
      if(Array.isArray(d.sessions)&&d.sessions.length>0)state.sessions=d.sessions;
      else if(Array.isArray(src.sessions)&&src.sessions.length>0)state.sessions=src.sessions;
      if(d.locations)state.locations=d.locations;else if(src.locations)state.locations=src.locations;
      if(d.dayNotes)state.dayNotes=d.dayNotes;else if(src.dayNotes)state.dayNotes=src.dayNotes;
      if(d.workerAvail)state.workerAvail=d.workerAvail;else if(src.workerAvail)state.workerAvail=src.workerAvail;
      if(d.payPeriodStatus)state.payPeriodStatus=d.payPeriodStatus;else if(src.payPeriodStatus)state.payPeriodStatus=src.payPeriodStatus;
      // weekOffset not loaded from DB — worker portal always uses today's date
    }
    setSyn('ok','Connected');
    buildWorkerSelect();
    updWkLbl();
    var saved=localStorage.getItem('eb_worker_id');
    if(saved){
      var w=state.workers.find(function(x){return x.id===saved});
      if(w){selWorker=saved;showMainScreen(w);return}
      else localStorage.removeItem('eb_worker_id');
    }
  }catch(e){
    setSyn('err','Could not connect. Try refreshing.');
  }
}

function buildWorkerSelect(){
  var sel=document.getElementById('worker-select');
  sel.innerHTML='<option value="">-- Select your name --</option>'+
    state.workers.slice().sort(function(a,b){return a.name.localeCompare(b.name)}).map(function(w){return '<option value="'+w.id+'">'+w.name+'</option>'}).join('');
}

function onWorkerSelect(){
  var sel=document.getElementById('worker-select');if(!sel.value)return;
  var w=state.workers.find(function(x){return x.id===sel.value});if(!w)return;
  selWorker=sel.value;localStorage.setItem('eb_worker_id',selWorker);showMainScreen(w);
}

function showMainScreen(w){
  initWkOff();
  updWkLbl();
  document.getElementById('screen-auth').style.display='none';
  document.getElementById('screen-main').style.display='block';
  document.getElementById('signed-in-name').textContent=w.name;
  updWkLbl();renderActive();scrollToToday();
}

function signOut(){
  selWorker=null;localStorage.removeItem('eb_worker_id');
  document.getElementById('screen-auth').style.display='block';
  document.getElementById('screen-main').style.display='none';
  load();
}

async function register(){
  var name=document.getElementById('reg-name').value.trim();
  if(!name){document.getElementById('reg-flash').textContent='Name is required.';document.getElementById('reg-flash').style.color='#f07070';return}
  var email=document.getElementById('reg-email').value.trim();
  var phone=document.getElementById('reg-phone').value.trim();
  var flash=document.getElementById('reg-flash');
  flash.style.color='#f0c060';flash.textContent='Registering...';
  var existing=state.workers.find(function(w){return w.name.toLowerCase()===name.toLowerCase()});
  if(existing){
    selWorker=existing.id;localStorage.setItem('eb_worker_id',selWorker);
    if(email)existing.email=email;if(phone)existing.contact=phone;
    await dbSave();
    flash.style.color='#60c070';flash.textContent='Welcome back, '+existing.name+'!';
    setTimeout(function(){showMainScreen(existing)},800);return;
  }
  var nw={id:gid(),name:name,role:'court',contact:phone,email:email||''};
  state.workers.push(nw);selWorker=nw.id;localStorage.setItem('eb_worker_id',selWorker);
  try{
    await dbSave();
    flash.style.color='#60c070';flash.textContent='Registered! Welcome, '+name+'!';
    buildWorkerSelect();setTimeout(function(){showMainScreen(nw)},800);
  }catch(e){
    flash.style.color='#f07070';flash.textContent='Registration failed. Try again.';
    state.workers=state.workers.filter(function(w){return w.id!==nw.id});
  }
}

async function dbSave(){
  var cur={};
  try{
    var rc=await fetch(SBU+'/rest/v1/state?id=eq.main&select=data',{headers:HDR});
    var rj=await rc.json();
    if(rj&&rj.length&&rj[0].data){
      cur=rj[0].data;
      if(cur.state){var s=cur.state;if(Array.isArray(s.workers)&&s.workers.length>0&&!(cur.workers&&cur.workers.length>0))cur.workers=s.workers;delete cur.state;}
    }
  }catch(e){}
  cur.workers=state.workers;
  cur.workerAvail=state.workerAvail;
  var r=await fetch(SBU+'/rest/v1/state?id=eq.main',{
    method:'PATCH',headers:Object.assign({},HDR,{'Prefer':'return=minimal'}),
    body:JSON.stringify({data:cur,updated_at:new Date().toISOString()})
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
  setSyn('ok','Saved');
}

function wkSessions(wo){
  var owned=state.sessions.filter(function(s){return s.week===wo});
  var rec=state.sessions.filter(function(s){return s.recurring&&s.week!==wo&&!state.sessions.find(function(x){return x.recurringFrom===s.id&&x.week===wo})});
  return owned.concat(rec.map(function(s){return Object.assign({},s,{id:s.id+'_r'+wo,week:wo,recurringFrom:s.id,isRI:true})}));
}

function renderShifts(){
  var el=document.getElementById('tab-shifts');
  var worker=state.workers.find(function(w){return w.id===selWorker});if(!worker){el.innerHTML='';return}
  var ws=wkSessions(wkOff);
  var myShifts=ws.filter(function(s){return (s.workers||[]).indexOf(selWorker)>=0||s.contentWorker===selWorker})
    .sort(function(a,b){return DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||t2m(a.start)-t2m(b.start)});
  var totalMins=myShifts.reduce(function(a,s){return a+t2m(s.end)-t2m(s.start)},0);
  var totalHrs=parseFloat((totalMins/60).toFixed(2));
  var showPay=!payExcluded(worker);
  var totalPay=Math.round(totalHrs*workerRate(worker));
  var dates=getWkDates();
  var byDay={};DAYS.forEach(function(d){byDay[d]=[]});
  myShifts.forEach(function(s){if(byDay[s.day])byDay[s.day].push(s)});

  var html='<div class="card">';
  html+='<div class="worker-header">'
    +'<div class="avatar'+(worker.isContentTeam?' ct':'')+'">'+ini(worker.name)+'</div>'
    +'<div><div class="wname">'+worker.name+'</div><div class="winfo">'
    ''
    +'</div></div>'
    +'<div class="wstats"><div class="whrs">'+totalHrs.toFixed(1)+' hrs</div>'+(showPay?'<div class="wpay">$'+totalPay+'</div>':'')+'</div>'
    +'</div>';

  // Day pills grid
  html+='<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:14px">';
  DAYS.forEach(function(day,i){
    var ds=byDay[day];var has=ds.length>0;
    if(has){
      html+='<div class="day-pill active" onclick="scrollToShiftDay(\'sday-'+day+'\')">'
        +'<div style="font-size:11px;font-weight:600">'+day.slice(0,3)+'</div>'
        +'<div style="font-size:10px;margin-top:2px">'+ds.length+' shift'+(ds.length>1?'s':'')+' </div>'
        +'</div>';
    } else {
      html+='<div class="day-pill off">'
        +'<div style="font-size:11px;font-weight:600">'+day.slice(0,3)+'</div>'
        +'<div style="font-size:10px;margin-top:2px">off</div>'
        +'</div>';
    }
  });
  html+='</div>';

  if(!myShifts.length){
    html+='<div style="text-align:center;padding:2rem;color:#666;font-size:13px">No shifts this week.<br><span style="font-size:12px">Check back after coach builds the schedule.</span></div>';
  } else {
    html+='<div style="display:flex;gap:1rem;margin-bottom:14px;padding:10px;background:#222;border-radius:8px">'
      +'<div style="flex:1;text-align:center"><div style="font-size:11px;color:#999">Shifts</div><div style="font-size:18px;font-weight:600">'+myShifts.length+'</div></div>'
      +'<div style="flex:1;text-align:center"><div style="font-size:11px;color:#999">Hours</div><div style="font-size:18px;font-weight:600">'+totalHrs.toFixed(1)+'</div></div>'
      +(showPay?'<div style="flex:1;text-align:center"><div style="font-size:11px;color:#999">Pay</div><div style="font-size:18px;font-weight:600;color:#60c070">$'+totalPay+'</div></div>':'')
      +'</div>';

    DAYS.forEach(function(day,di){
      var ds=byDay[day];if(!ds.length)return;
      var date=dates[di];html+='<div id="sday-'+day+'" style="margin-bottom:14px">';
      html+='<div style="display:flex;align-items:center;padding:5px 0;margin-bottom:8px;border-bottom:1px solid #2e2e2e">'
        +'<span style="font-size:15px;font-weight:700;color:#7ab8f0">'+day+'</span>'
        +' <span style="font-size:12px;color:#666;margin-left:6px">'+fmtD(date)+'</span>'
        +'</div>';
      ds.forEach(function(s){
        var isContent=s.contentWorker===selWorker;
        var dur=((t2m(s.end)-t2m(s.start))/60).toFixed(1);
        var pay=Math.round((t2m(s.end)-t2m(s.start))/60*workerRate(worker));
        var coworkers=(s.workers||[]).filter(function(id){return id!==selWorker}).map(function(id){var w=state.workers.find(function(x){return x.id===id});return w?w.name:''}).filter(Boolean);
        if(!isContent&&s.contentWorker){var cw=state.workers.find(function(w){return w.id===s.contentWorker});if(cw)coworkers.push(cw.name+' (film)')}
        var note=state.dayNotes[day+'-'+wkOff]||'';
        var cls='shift ';if(s.hoop==='pro')cls+='hps';else if(s.hoop==='1')cls+='h1s';else cls+='h2s';if(s.status==='tentative')cls+=' tents';
        html+='<div class="'+cls+'">';
        html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
          +'<div style="font-size:16px;font-weight:600">'+(s.player||'Session')+(s.type==='group'?' (group)':'')+'</div>'
          +'<div style="text-align:right">'
          +'<div style="font-size:14px;font-weight:600">'+fmtT(s.start)+' - '+fmtT(s.end)+'</div>'
          +(showPay?'<div style="font-size:13px;color:#60c070;font-weight:500">$'+pay+'</div>':'')
          +'</div></div>';
        html+='<div style="display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:#aaa;margin-bottom:6px">'

          +(s.focus?'<span style="color:#e8e8e8">'+s.focus+'</span>':'')
          +'<span>'+dur+' hr</span>'
          +(isContent?'<span class="bdg bt">Filming</span>':'<span class="bdg bc">On-court</span>')
          +(s.status==='tentative'?'<span class="bdg btent">Tentative</span>':'')
          +'</div>';
        if(s.location||state.locations[day]){
          var loc=s.location||state.locations[day];
          html+='<div style="font-size:12px;color:#f0c060;margin-bottom:4px">&#128205; '+loc+'</div>';
        }
        if(coworkers.length){
          html+='<div style="font-size:12px;color:#999">With: <span style="color:#e8e8e8">'+coworkers.join(', ')+'</span></div>';
        }
        if(note)html+='<div style="margin-top:8px;background:#2d2008;border-radius:6px;padding:6px 8px;font-size:12px;color:#f0c060">'+note+'</div>';
        // Worker confirm button
        var wConfs=s.workerConfirmations||[];
        var isConfirmed=wConfs.indexOf(selWorker)>=0;
        html+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07)">';
        if(isConfirmed){
          html+='<div style="display:flex;align-items:center;justify-content:space-between">'
            +'<span style="font-size:12px;color:#60c070;font-weight:600">&#10003; You\'re confirmed</span>'
            +'<button onclick="toggleWorkerConf(\''+s.id+'\',false)" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #3a3a3a;background:transparent;color:#999;cursor:pointer">Undo</button>'
            +'</div>';
        } else {
          html+='<button onclick="toggleWorkerConf(\''+s.id+'\',true)" style="width:100%;padding:9px;border-radius:8px;border:1px solid #3a3a3a;background:transparent;color:#7ab8f0;cursor:pointer;font-size:13px;font-weight:500">Confirm attendance</button>';
        }
        html+='</div>';
        html+='</div>';
      });
      html+='</div>';
    });
  }
  html+='</div>';
  el.innerHTML=html;
}

function renderAvail(){
  var el=document.getElementById('tab-avail');
  var worker=state.workers.find(function(w){return w.id===selWorker});if(!worker){el.innerHTML='';return}
  // Auto-advance to next week on Wed/Thu/Fri
  var availWkOff=wkOff;
  var dates=getWkDatesFor(availWkOff);var to=timeOpts();
  var unavailKey=selWorker+'-unavail-'+availWkOff;
  var isUnavail=!!state.workerAvail[unavailKey];
  var html='<div class="card">';
  var wkLabel='Week of '+fmtD(dates[0])+' – '+fmtD(dates[5]);


  // Unavailable this week banner/button
  if(isUnavail){
    html+='<div style="background:#2d0a0a;border:1px solid #7a1a1a;border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">'
      +'<div><div style="font-size:14px;font-weight:600;color:#f07070">&#128683; Marked unavailable this week</div>'
      +'<div style="font-size:12px;color:#999;margin-top:3px">Your coach has been notified.</div></div>'
      +'<button class="btn btn-sm" style="border-color:#7a1a1a;color:#f07070;white-space:nowrap" onclick="togUnavailWeek()">Undo</button>'
      +'</div>';
  } else {
    html+='<button class="btn" style="margin-bottom:14px;border-color:#7a1a1a;color:#f07070;padding:11px" onclick="togUnavailWeek()">&#128683; Mark unavailable this week</button>';
  }

  html+='<div class="card-title">My availability</div>'
    +'<p style="font-size:12px;color:#999;margin-bottom:12px">Tap a day to mark yourself available. Set times if you have a specific window.</p>'
    +(dates.some(function(d){var t=new Date();t.setHours(0,0,0,0);return d<t;})?'<div style="font-size:12px;color:#666;background:#1a1a1a;border:1px solid #2e2e2e;border-radius:8px;padding:8px 12px;margin-bottom:12px">&#128337; Availability is for upcoming days only — past dates are locked.</div>':'');

  DAYS.forEach(function(day,i){
    var k=selWorker+'-'+day+'-'+availWkOff;var isOn=!!state.workerAvail[k];
    var fv=state.workerAvail[selWorker+'-'+day+'-'+availWkOff+'-from']||'';
    var tv=state.workerAvail[selWorker+'-'+day+'-'+availWkOff+'-to']||'';
    var timeLabel=isOn?(fv||tv?(fmtT(fv)||'open')+' - '+(fmtT(tv)||'open'):'Any time'):'';
    var dayDate=dates[i];
    var today=new Date();today.setHours(0,0,0,0);
    var isPast=dayDate<today;
    html+='<div class="avail-day-block"'+(isUnavail||isPast?' style="opacity:'+(isPast?'0.35':'0.4')+';pointer-events:none"':'')+'>'+
      '<div class="avail-day-header'+(isOn?' on':'')+'" onclick="'+(isPast?'':'togAvailDay(\''+day+'\')')+'">'
      +'<div class="avail-day-left"><div class="avail-check">'+(isOn?'&#9989;':'&#9898;')+'</div>'
      +'<div><div class="avail-day-name">'+day+'</div><div class="avail-day-date">'+fmtD(dates[i])+(isPast?' · Past':'')+'</div></div></div>'
      +'<div class="avail-day-right">'+(isPast?'<span style="font-size:11px;color:#555">Passed</span>':timeLabel)+'</div></div>'
      +(isOn&&!isPast?'<div class="avail-times show">'
        +'<div class="time-row"><label>From</label><select id="from-'+day+'" onchange="saveTimeLocal(\''+day+'\')">'+to+'</select></div>'
        +'<div class="time-row"><label>To</label><select id="to-'+day+'" onchange="saveTimeLocal(\''+day+'\')">'+to+'</select></div>'
        +'<div style="font-size:11px;color:#666;margin-top:4px">Leave as Any time if fully available.</div>'
        +'</div>':'')
      +'</div>';
  });
  html+='<button class="btn btn-p" style="margin-top:12px;padding:12px" onclick="saveAvail()">Save availability</button>'
    +'<div class="saved-flash" id="avail-flash"></div></div>';
  el.innerHTML=html;
  DAYS.forEach(function(day){
    var fEl=document.getElementById('from-'+day);var tEl=document.getElementById('to-'+day);
    if(fEl)fEl.value=state.workerAvail[selWorker+'-'+day+'-'+availWkOff+'-from']||'';
    if(tEl)tEl.value=state.workerAvail[selWorker+'-'+day+'-'+availWkOff+'-to']||'';
  });
}

    await dbSave();

function renderPayHistory(){
  var el=document.getElementById('tab-pay');
  var worker=state.workers.find(function(w){return w.id===selWorker});if(!worker){el.innerHTML='';return;}
  if(payExcluded(worker)){
    var reason=workerType(worker)==='intern'?'Interns are on a stipend and aren\'t tracked in Worker Pay.':workerType(worker)==='salary'?'Salaried staff aren\'t tracked in Worker Pay.':'Coaches aren\'t tracked in Worker Pay.';
    el.innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#999"><div style="font-size:28px;margin-bottom:10px">&#128203;</div><div style="font-size:14px;font-weight:500;color:#e8e8e8;margin-bottom:6px">No pay tracking for your role</div><div style="font-size:12px;color:#777">'+reason+'</div></div>';
    return;
  }
  var rate=workerRate(worker);
  var allS=state.sessions.filter(function(s){return (s.workers||[]).indexOf(selWorker)>=0||s.contentWorker===selWorker;});
  if(!allS.length){el.innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#666">No sessions recorded yet.</div>';return;}
  var weeks=allS.map(function(s){return s.week||0});
  var minWk=Math.min.apply(null,weeks);var maxWk=Math.max.apply(null,weeks);
  var periods=[];
  for(var pw=minWk;pw<=maxWk;pw+=2){
    var w1=pw,w2=pw+1;
    var ps=allS.filter(function(s){return s.week===w1||s.week===w2;});
    if(!ps.length)continue;
    var mins=ps.reduce(function(a,s){return a+t2m(s.end)-t2m(s.start);},0);
    var hrs=parseFloat((mins/60).toFixed(2));var pay=Math.round(hrs*rate);
    var d1=getWkDatesFor(w1)[0];var d2=getWkDatesFor(w2)[5];
    var status=(state.payPeriodStatus&&state.payPeriodStatus[selWorker+'-period-'+w1])||'pending';
    periods.push({w1:w1,w2:w2,sessions:ps,hrs:hrs,pay:pay,d1:d1,d2:d2,status:status});
  }
  periods.reverse();
  var totalUnpaid=periods.filter(function(p){return p.status!=='paid';}).reduce(function(a,p){return a+p.pay;},0);
  var totalPaid=periods.filter(function(p){return p.status==='paid';}).reduce(function(a,p){return a+p.pay;},0);
  var html='<div class="card" style="margin-bottom:1rem"><div style="display:flex;gap:10px">'
    +'<div style="flex:1;background:#0a2d18;border:1px solid #1a5a25;border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;color:#999;margin-bottom:4px">Total earned</div><div style="font-size:22px;font-weight:700;color:#60c070">$'+(totalPaid+totalUnpaid)+'</div></div>'
    +'<div style="flex:1;background:#2d1f08;border:1px solid #6a4010;border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;color:#999;margin-bottom:4px">Pending payment</div><div style="font-size:22px;font-weight:700;color:#f0b060">$'+totalUnpaid+'</div></div>'
    +'</div></div>';
  periods.forEach(function(p){
    var isPaid=p.status==='paid';
    html+='<div class="card" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      +'<div><div style="font-size:14px;font-weight:600">'+fmtD(p.d1)+' to '+fmtD(p.d2)+'</div>'
      +'<div style="font-size:11px;color:#999;margin-top:2px">'+p.sessions.length+' sessions &middot; '+p.hrs.toFixed(1)+' hrs</div></div>'
      +'<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:'+(isPaid?'#60c070':'#f0b060')+'">${'+p.pay+'}</div>'
      +'<div style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;'+(isPaid?'background:#0a2010;color:#60c070':'background:#2d2008;color:#f0c060')+'">'+(isPaid?'Paid':'Pending')+'</div>'
      +'</div></div>'
      +'<div style="border-top:1px solid #2e2e2e;padding-top:10px">';
    p.sessions.sort(function(a,b){return(a.week||0)-(b.week||0)||DAYS.indexOf(a.day)-DAYS.indexOf(b.day);}).forEach(function(s){
      var dur=((t2m(s.end)-t2m(s.start))/60).toFixed(1);
      var sPay=Math.round((t2m(s.end)-t2m(s.start))/60*rate);
      html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:12px">'
        +'<div><span style="color:#e8e8e8">'+s.day+'</span>'
        +(s.player?'<span style="color:#7ab8f0;margin-left:8px">'+s.player+'</span>':'')
        +'<span style="color:#999;margin-left:8px">'+fmtT(s.start)+'-'+fmtT(s.end)+'</span></div>'
        +'<div style="color:#60c070;font-weight:500">$'+sPay+'</div></div>';
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}

setInterval(function(){
  fetch(SBU+'/rest/v1/state?id=eq.main&select=data',{headers:HDR})
    .then(function(r){return r.json()})
    .then(function(rows){
      if(rows&&rows.length&&rows[0].data){
        var d=rows[0].data;var src=d.state||d;
        if(Array.isArray(d.workers)&&d.workers.length>0)state.workers=d.workers;
        else if(Array.isArray(src.workers)&&src.workers.length>0)state.workers=src.workers;
        if(Array.isArray(d.sessions)&&d.sessions.length>0)state.sessions=d.sessions;
        else if(Array.isArray(src.sessions)&&src.sessions.length>0)state.sessions=src.sessions;
        if(d.locations)state.locations=d.locations;else if(src.locations)state.locations=src.locations;
        if(d.dayNotes)state.dayNotes=d.dayNotes;else if(src.dayNotes)state.dayNotes=src.dayNotes;
        if(d.workerAvail)state.workerAvail=d.workerAvail;else if(src.workerAvail)state.workerAvail=src.workerAvail;
        buildWorkerSelect();
        if(selWorker&&activeTab==='shifts')renderShifts();
      }
    }).catch(function(){});
},60000);

async function toggleWorkerConf(sessId, confirm){
  var s=state.sessions.find(function(x){return x.id===sessId});if(!s)return;
  var wConfs=s.workerConfirmations||[];
  if(confirm){if(wConfs.indexOf(selWorker)<0)wConfs.push(selWorker);}
  else{wConfs=wConfs.filter(function(id){return id!==selWorker});}
  s.workerConfirmations=wConfs;
  try{
    var r=await fetch(SBU+'/rest/v1/state?id=eq.main&select=data',{headers:HDR});
    var rows=await r.json();var cur={};
    if(rows&&rows.length&&rows[0].data)cur=rows[0].data;
    // Only update workerConfirmations on the specific session - don't overwrite all sessions
    var sessions=cur.sessions||[];
    var si=sessions.findIndex(function(x){return x.id===sessId});
    if(si>=0){sessions[si].workerConfirmations=wConfs;}
    cur.sessions=sessions;
    await fetch(SBU+'/rest/v1/state?id=eq.main',{method:'PATCH',headers:Object.assign({},HDR,{'Prefer':'return=minimal'}),body:JSON.stringify({data:cur,updated_at:new Date().toISOString()})});
    renderShifts();
  }catch(e){console.warn('Confirm save failed',e);}
}
